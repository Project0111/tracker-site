<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Auto Share Project Share Links</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#0f172a; color:white; padding:24px; }
    .card { max-width:980px; margin:0 auto; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:20px; padding:24px; }
    .item { border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:14px; margin-top:12px; }
    .mono { font-family:Consolas,monospace; word-break:break-all; color:#cbd5e1; }
    .mode-tag { display:inline-block; font-size:12px; padding:2px 8px; border-radius:999px; background:rgba(255,255,255,.12); margin-left:8px; }
    button { margin-top:10px; padding:10px 14px; border:0; border-radius:10px; cursor:pointer; font-weight:700; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Family Auto Share Project — Generated Share Links</h1>
    <p>Send the correct link to the correct person. Sharing starts only after they open the link, accept, and allow location access.</p>
    <div class='item'><strong>joe_pictures</strong><span class='mode-tag'>One-time</span><div class='mono' id='link_joe'>https://YOURNAME.github.io/tracker-site/joe.html</div><button onclick="copyLink(document.getElementById('link_joe').textContent)">Copy Link</button></div>
  </div>
  <script>
    async function copyLink(text) {
      try { await navigator.clipboard.writeText(text); alert('Link copied'); }
      catch (e) { alert('Copy failed'); }
    }
  </script>
</body>
</html>
