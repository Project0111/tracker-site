<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Auto Share Project</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; min-height:100vh; display:grid; place-items:center; background:linear-gradient(135deg,#0f172a,#1e293b); color:white; padding:24px; }
    .card { width:min(760px,100%); background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); border-radius:24px; padding:28px; }
    .warn { background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.35); padding:14px; border-radius:14px; margin:18px 0; }
    .done { background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.35); padding:14px; border-radius:14px; margin-top:18px; }
    button { background:#22c55e; color:white; border:0; border-radius:12px; padding:14px 18px; font-size:16px; font-weight:700; cursor:pointer; }
    .small { color:#cbd5e1; font-size:14px; line-height:1.6; }
    input { width:100%; padding:12px; border-radius:10px; border:0; margin:8px 0 16px 0; }
    .mode-tag { display:inline-block; font-size:12px; padding:2px 8px; border-radius:999px; background:rgba(255,255,255,.12); margin-left:8px; }
  </style>
</head>
<body>
  <div class="card" id="appCard">
    <h1>Family Auto Share Project <span class="mode-tag">One-time</span></h1>
    <p>Consent-based live location sharing for family members and trusted friends.</p>
    <div class="warn"><strong>Consent required.</strong> Tap Accept, then allow location when your browser asks.</div>
    <p class="small">Invite label: <strong>joe_pictures</strong><br/>Session token: <code>joe_pictures</code></p>
    <label class="small">Your name</label>
    <input id="name" placeholder="Enter your name" value="joe_pictures" />
    <button id="startBtn">Accept & Start One-Time Location Share</button>
    <div id="status" class="small" style="margin-top:12px;">Waiting for user action.</div>
  </div>
  <script>
    const apiBase = 'https://o2-ym28.onrender.com';
    const token = "joe_pictures";
    const mode = "one_time";
    const statusEl = document.getElementById('status');
    const nameEl = document.getElementById('name');
    const appCard = document.getElementById('appCard');
    let lowBatteryAlerted = false;

    function beep(freq=880, duration=160) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.value = 0.05;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        setTimeout(() => { osc.stop(); ctx.close(); }, duration);
      } catch (e) {}
    }

    async function postJson(url, payload) {
      const res = await fetch(apiBase + url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        let detail = 'Request failed';
        try {
          const data = await res.json();
          detail = data.detail || detail;
        } catch (e) {}
        throw new Error(detail);
      }
      return res.json();
    }

    async function getJson(url) {
      const res = await fetch(apiBase + url);
      return res.json();
    }

    async function getBatteryLevel() {
      try {
        if (!navigator.getBattery) return null;
        const battery = await navigator.getBattery();
        return Math.round(battery.level * 100);
      } catch (e) { return null; }
    }

    function finishOneTime(message) {
      appCard.innerHTML = '<h1>Location Sent Successfully</h1><div class="done">' + message + '</div><p class="small" style="margin-top:14px;">This one-time link has been completed and should not be used again.</p>';
      setTimeout(() => {
        try { window.close(); } catch (e) {}
      }, 2500);
    }

    async function checkUsedStatus() {
      if (mode !== 'one_time') return;
      try {
        const data = await getJson('/api/link-status/' + token);
        if (data.used) finishOneTime('This one-time link has already been used.');
      } catch (e) {}
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
      const participantName = nameEl.value.trim() || 'Participant';
      if (!navigator.geolocation) {
        statusEl.textContent = 'Geolocation is not supported on this device.';
        return;
      }

      statusEl.textContent = 'Requesting location permission…';

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const battery = await getBatteryLevel();
          try {
            await postJson('/api/session/start', {
              token,
              participant_name: participantName,
              expires_minutes: 500,
              battery,
              mode
            });

            await postJson('/api/location/update', {
              token,
              latitude: position.coords.latitude,
              longitude: position.coords.longitude,
              accuracy: position.coords.accuracy,
              battery,
              timestamp: new Date().toISOString()
            });

            beep(980, 140);

            if (mode === 'one_time') {
              let extra = '';
              if (battery !== null && battery <= 20) extra = ' Low battery: ' + battery + '%.';
              finishOneTime('Your current location was sent successfully.' + extra);
              return;
            }

            let extra = '';
            if (battery !== null && battery <= 20) {
              extra = ' | Low battery: ' + battery + '%';
              if (!lowBatteryAlerted) {
                beep(520, 260);
                lowBatteryAlerted = true;
              }
            }
            statusEl.textContent = 'Location allowed. Live sharing started.' + extra;

            navigator.geolocation.watchPosition(
              async (pos) => {
                const batteryNow = await getBatteryLevel();
                try {
                  await postJson('/api/location/update', {
                    token,
                    latitude: pos.coords.latitude,
                    longitude: pos.coords.longitude,
                    accuracy: pos.coords.accuracy,
                    battery: batteryNow,
                    timestamp: new Date().toISOString()
                  });
                  let liveExtra = '';
                  if (batteryNow !== null && batteryNow <= 20) {
                    liveExtra = ' | Low battery: ' + batteryNow + '%';
                    if (!lowBatteryAlerted) {
                      beep(520, 260);
                      lowBatteryAlerted = true;
                    }
                  }
                  statusEl.textContent = 'Live sharing active: ' + new Date().toLocaleTimeString() + liveExtra;
                } catch (e) {
                  statusEl.textContent = 'Update failed. Backend may be offline.';
                }
              },
              (err) => {
                beep(420, 220);
                statusEl.textContent = 'Live update error: ' + err.message;
              },
              { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
            );
          } catch (e) {
            statusEl.textContent = e.message || 'Backend error. Could not start sharing.';
            if (mode === 'one_time' && String(e.message).toLowerCase().includes('already been used')) {
              finishOneTime('This one-time link has already been used.');
            }
          }
        },
        (error) => {
          beep(420, 220);
          statusEl.textContent = 'Location permission denied or unavailable: ' + error.message;
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
      );
    });

    checkUsedStatus();
  </script>
</body>
</html>
